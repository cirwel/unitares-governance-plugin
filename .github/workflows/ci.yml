name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Plugin tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml

      - name: Check command cache contract
        run: ./scripts/dev/lint-command-cache-contract.sh

      - name: Check skill freshness metadata
        run: ./scripts/check-skill-freshness.sh

      - name: Run tests
        run: python -m pytest
