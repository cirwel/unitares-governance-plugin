name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Plugin tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pyyaml

      - name: Check command cache contract
        run: ./scripts/dev/lint-command-cache-contract.sh

      - name: Check doc drift contract
        run: ./scripts/dev/lint-doc-drift.sh

      - name: Check documented helper commands
        run: python scripts/dev/lint-doc-command-examples.py

      - name: Check skill freshness metadata
        run: ./scripts/check-skill-freshness.sh

      - name: Check skills parity with canonical fingerprint
        # The synced skills/SKILLS_MANIFEST.sha256 is unitares' canonical
        # fingerprint (per-file sha256 + aggregate). Recompute it from the
        # mirrored skills/ tree and fail if they disagree — i.e. the mirror
        # drifted from canonical, or the manifest wasn't re-synced.
        run: |
          python3 - <<'PY'
          import hashlib, pathlib, sys
          skills = pathlib.Path("skills")
          manifest = skills / "SKILLS_MANIFEST.sha256"
          if not manifest.exists():
              sys.exit("SKILLS_MANIFEST.sha256 missing — re-run sync-plugin-skills.sh from unitares")
          files = sorted(
              (p for p in skills.rglob("*") if p.is_file() and p.name != manifest.name),
              key=lambda p: p.relative_to(skills).as_posix(),
          )
          lines = [f"{hashlib.sha256(p.read_bytes()).hexdigest()}  {p.relative_to(skills).as_posix()}" for p in files]
          actual = hashlib.sha256("\n".join(lines).encode()).hexdigest()
          want = next((l.split("aggregate:")[1].strip()
                       for l in manifest.read_text().splitlines() if "aggregate:" in l), None)
          if actual != want:
              sys.exit(f"skills drift: mirror aggregate {actual} != canonical {want}\n"
                       "re-run scripts/dev/sync-plugin-skills.sh from unitares, then commit the mirror")
          print(f"skills parity OK ({len(files)} files, aggregate {actual[:12]})")
          PY

      - name: Run tests
        run: python -m pytest

  scope:
    name: Scope guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine diff base
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      # Operator-local paths and Claude session-attribution links
      # (claude.ai/code/session / Claude-Session:) must not enter the public
      # history — in committed files, the PR body, or commit messages. The
      # session trailer is appended by the Claude Code harness by default and
      # is the commit-level analogue of Co-Authored-By, which this repo omits.
      - name: Lint changed files
        run: |
          base="${{ steps.base.outputs.ref }}"
          files=$(git diff --name-only --diff-filter=ACMR "${base}...HEAD" 2>/dev/null \
                  || git diff --name-only --diff-filter=ACMR "$base")
          rc=0
          for f in $files; do
            case "$f" in .github/workflows/ci.yml) continue;; esac
            [ -f "$f" ] || continue
            if grep -nIE '/Users/cirwel|claude\.ai/code/session|Claude-Session:' "$f" >/dev/null 2>&1; then
              echo "::error file=$f::operator-local path or Claude session-attribution link in committed content"
              rc=1
            fi
          done
          if [ "$rc" = 0 ]; then echo "Files: clean"; fi
          exit $rc

      - name: Lint PR body
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Meta-PRs that name these patterns opt out with the HTML comment
          # <!-- scope-guard: allow-register --> in the body.
          if printf '%s' "$PR_BODY" | grep -q 'scope-guard: allow-register'; then
            echo "PR body: allow-register marker present — skipping."; exit 0
          fi
          if printf '%s' "$PR_BODY" | grep -qiE '/Users/cirwel'; then
            echo "::error::PR body leaks an operator-local path. Remove it."
            exit 1
          fi
          echo "PR body: clean"

      # NOTE: the Claude session-attribution trailer (claude.ai/code/session /
      # Claude-Session:) is intentionally NOT gated in PR bodies or commit
      # messages — the Claude Code harness injects it automatically on every PR
      # with no setting to disable it, so a blocking check rejected every Claude
      # PR. It is flagged only in committed file content above (operator-
      # controllable, never auto-added).
